apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: openedx
  namespace: argocd
spec:
  description: OpenEdX platform — dev, staging, prod

  sourceRepos:
    - "https://github.com/iam-alehaider/openedx-gitops"
    - "https://github.com/iam-alehaider/openedx-monitoring"
    - "https://charts.jetstack.io"
    - "https://prometheus-community.github.io/helm-charts"
    - "https://grafana.github.io/helm-charts"
    - "https://kedacore.github.io/charts"
    - "https://aws.github.io/eks-charts"
    - "https://secrets-store-csi-driver.sigs.k8s.io"
    - "https://kubernetes.github.io/ingress-nginx"

  destinations:
    - namespace: "openedx-dev"
      server: https://kubernetes.default.svc
    - namespace: "openedx-staging"
      server: https://kubernetes.default.svc
    - namespace: "openedx"
      server: https://kubernetes.default.svc
    - namespace: "ingress-nginx"
      server: https://kubernetes.default.svc
    - namespace: "cert-manager"
      server: https://kubernetes.default.svc
    - namespace: "kube-system"
      server: https://kubernetes.default.svc
    - namespace: "keda"
      server: https://kubernetes.default.svc
    - namespace: "monitoring"
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: storage.k8s.io
      kind: StorageClass
    - group: networking.k8s.io
      kind: IngressClass
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  roles:
    - name: developer
      description: Read-only access
      policies:
        - p, proj:openedx:developer, applications, get, openedx/*, allow
      groups: [openedx-developers]
    - name: admin
      description: Full access
      policies:
        - p, proj:openedx:admin, applications, *, openedx/*, allow
      groups: [openedx-admins]
