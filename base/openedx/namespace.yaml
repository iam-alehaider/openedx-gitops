apiVersion: v1
kind: Namespace
metadata:
  name: openedx
  labels:
    app.kubernetes.io/managed-by: argocd
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit:   restricted
    pod-security.kubernetes.io/warn:    restricted
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: openedx-quota
  namespace: openedx
spec:
  hard:
    requests.cpu:             "20"
    requests.memory:          "40Gi"
    limits.cpu:               "40"
    limits.memory:            "80Gi"
    pods:                     "100"
    services:                 "20"
    persistentvolumeclaims:   "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: openedx-limitrange
  namespace: openedx
spec:
  limits:
    - type: Container
      default:
        cpu:    "500m"
        memory: "512Mi"
      defaultRequest:
        cpu:    "100m"
        memory: "256Mi"
      max:
        cpu:    "4"
        memory: "8Gi"
